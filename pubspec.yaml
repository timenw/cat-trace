name: cat_trace
description: "猫迹 - 流浪猫记录与收集 App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: ^3.24.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 数据库
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # 路由
  go_router: ^14.2.0

  # 图片
  image_picker: ^1.1.2
  image: ^4.2.0
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0

  # AI 识别 (占位，后续接入 TFLite)
  # tflite_flutter: ^0.10.4

  # 通知
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # 存储与文件
  path_provider: ^2.1.4
  share_plus: ^10.1.1
  archive: ^3.6.1

  # UI
  flutter_staggered_grid_view: ^0.7.0
  animations: ^2.0.11
  lottie: ^3.1.3
  flutter_animate: ^4.5.0

  # 工具
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  package_info_plus: ^8.1.1
  permission_handler: ^11.3.1

  # 加密
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # PDF 导出
  pdf: ^3.11.1
  printing: ^5.13.0

  # 图标
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.2
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: CatTrace
      fonts:
        - asset: assets/fonts/CatTraceIcons.ttf
