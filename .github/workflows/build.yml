name: Build CatTrace APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch isar_flutter_libs
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
            sed -i '/android:attr\/lStar/d' "$MF"
          fi
          for BF in $(find "$DIR" -name 'build.gradle' -o -name 'build.gradle.kts'); do
            if ! grep -q namespace "$BF"; then
              if echo "$BF" | grep -q '\.kts$'; then
                sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$BF"
              else
                sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BF"
              fi
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk [= ]*[0-9]*/compileSdk 35/' "$BF"
            else
              sed -i '/^android {/a\    compileSdk 35' "$BF"
            fi
            # Remove lStar references from all xml files in the package
            find "$DIR" -name "*.xml" -exec sed -i '/lStar/d' {} +
            find "$DIR" -name "*.xml" -exec sed -i '/attr\/lStar/d' {} +
          done
          # Also patch the AAR file if it contains lStar references
          AAR=$(find "$PUB" -maxdepth 5 -name 'isar_flutter_libs-*.aar' | head -1)
          if [ -n "$AAR" ]; then
            TEMP_DIR=$(mktemp -d)
            unzip -o "$AAR" -d "$TEMP_DIR"
            find "$TEMP_DIR" -name "*.xml" -exec sed -i '/lStar/d' {} +
            cd "$TEMP_DIR" && zip -r "$AAR" . -x "*.DS_Store"
            cd - > /dev/null
            rm -rf "$TEMP_DIR"
            echo "Patched AAR: $AAR"
          fi
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch isar_flutter_libs
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
            sed -i '/android:attr\/lStar/d' "$MF"
          fi
          for BF in $(find "$DIR" -name 'build.gradle' -o -name 'build.gradle.kts'); do
            if ! grep -q namespace "$BF"; then
              if echo "$BF" | grep -q '\.kts$'; then
                sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$BF"
              else
                sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BF"
              fi
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk [= ]*[0-9]*/compileSdk 35/' "$BF"
            else
              sed -i '/^android {/a\    compileSdk 35' "$BF"
            fi
            # Remove lStar references from all xml files in the package
            find "$DIR" -name "*.xml" -exec sed -i '/lStar/d' {} +
            find "$DIR" -name "*.xml" -exec sed -i '/attr\/lStar/d' {} +
          done
          # Also patch the AAR file if it contains lStar references
          AAR=$(find "$PUB" -maxdepth 5 -name 'isar_flutter_libs-*.aar' | head -1)
          if [ -n "$AAR" ]; then
            TEMP_DIR=$(mktemp -d)
            unzip -o "$AAR" -d "$TEMP_DIR"
            find "$TEMP_DIR" -name "*.xml" -exec sed -i '/lStar/d' {} +
            cd "$TEMP_DIR" && zip -r "$AAR" . -x "*.DS_Store"
            cd - > /dev/null
            rm -rf "$TEMP_DIR"
            echo "Patched AAR: $AAR"
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Install Android SDK Platform 31 (for lStar attribute)
        run: |
          sdkmanager "platforms;android-31"
          mkdir -p /usr/local/lib/android/sdk/licenses
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > /usr/local/lib/android/sdk/licenses/android-sdk-license
      - name: Patch merged resources after build
        run: |
          MERGED=$(find build/isar_flutter_libs/intermediates/merged_res -name "values.xml" 2>/dev/null | head -1)
          if [ -n "$MERGED" ]; then
            sed -i '/lStar/d' "$MERGED"
            echo "Patched merged values.xml: $MERGED"
          fi
      - run: flutter build apk --release
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          HASH=${GITHUB_SHA::7}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CatTrace-v1.0.0-${DATE}-${HASH}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-release
          path: build/app/outputs/flutter-apk/CatTrace-v1.0.0-*.apk
