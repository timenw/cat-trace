name: Build CatTrace APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch isar_flutter_libs
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
            sed -i '/android:attr\/lStar/d' "$MF"
          fi
          for BF in $(find "$DIR" -name 'build.gradle' -o -name 'build.gradle.kts'); do
            if ! grep -q namespace "$BF"; then
              if echo "$BF" | grep -q '\.kts$'; then
                sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$BF"
              else
                sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BF"
              fi
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk [= ]*[0-9]*/compileSdk 34/' "$BF"
            else
              sed -i '/^android {/a\    compileSdk 34' "$BF"
            fi
            # Remove lStar references from all xml files in the package
            find "$DIR" -name "*.xml" -exec sed -i '/lStar/d' {} +
            find "$DIR" -name "*.xml" -exec sed -i '/attr\/lStar/d' {} +
          done
          # Patch the AAR: remove res/ directory entirely to eliminate lStar references
          AAR=$(find "$PUB" -name 'isar_flutter_libs-*.aar' 2>/dev/null | head -1)
          echo "Found AAR: $AAR"
          if [ -n "$AAR" ]; then
            TEMP_DIR=$(mktemp -d)
            unzip -qo "$AAR" -d "$TEMP_DIR" 2>&1 || echo "unzip failed"
            echo "Unzipped contents: $(ls $TEMP_DIR/)"
            if [ -d "$TEMP_DIR/res" ]; then
              echo "Removing res/ from AAR"
              rm -rf "$TEMP_DIR/res"
              cd "$TEMP_DIR" && zip -qr "$AAR" . -x "*.DS_Store" 2>&1 || echo "zip failed"
              cd - > /dev/null
              echo "Removed res/ from AAR: $AAR"
            else
              echo "No res/ found in extracted AAR"
            fi
            rm -rf "$TEMP_DIR"
          else
            echo "No AAR found in pub cache"
            # List what's in the isar directory
            ISAR_DIR=$(find "$PUB" -maxdepth 4 -type d -name 'isar*' 2>/dev/null | head -5)
            echo "Isar dirs: $ISAR_DIR"
            find "$PUB" -name '*isar*' -type f 2>/dev/null | head -10
          fi
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch isar_flutter_libs
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
            sed -i '/android:attr\/lStar/d' "$MF"
          fi
          for BF in $(find "$DIR" -name 'build.gradle' -o -name 'build.gradle.kts'); do
            if ! grep -q namespace "$BF"; then
              if echo "$BF" | grep -q '\.kts$'; then
                sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$BF"
              else
                sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BF"
              fi
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk [= ]*[0-9]*/compileSdk 34/' "$BF"
            else
              sed -i '/^android {/a\    compileSdk 34' "$BF"
            fi
            # Remove lStar references from all xml files in the package
            find "$DIR" -name "*.xml" -exec sed -i '/lStar/d' {} +
            find "$DIR" -name "*.xml" -exec sed -i '/attr\/lStar/d' {} +
          done
          # Patch the AAR: remove res/ directory entirely to eliminate lStar references
          AAR=$(find "$PUB" -name 'isar_flutter_libs-*.aar' 2>/dev/null | head -1)
          echo "Found AAR: $AAR"
          if [ -n "$AAR" ]; then
            TEMP_DIR=$(mktemp -d)
            unzip -qo "$AAR" -d "$TEMP_DIR" 2>&1 || echo "unzip failed"
            echo "Unzipped contents: $(ls $TEMP_DIR/)"
            if [ -d "$TEMP_DIR/res" ]; then
              echo "Removing res/ from AAR"
              rm -rf "$TEMP_DIR/res"
              cd "$TEMP_DIR" && zip -qr "$AAR" . -x "*.DS_Store" 2>&1 || echo "zip failed"
              cd - > /dev/null
              echo "Removed res/ from AAR: $AAR"
            else
              echo "No res/ found in extracted AAR"
            fi
            rm -rf "$TEMP_DIR"
          else
            echo "No AAR found in pub cache"
            # List what's in the isar directory
            ISAR_DIR=$(find "$PUB" -maxdepth 4 -type d -name 'isar*' 2>/dev/null | head -5)
            echo "Isar dirs: $ISAR_DIR"
            find "$PUB" -name '*isar*' -type f 2>/dev/null | head -10
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Install Android SDK Platform 34
        run: |
          # Download cmdline-tools if not present
          CMDLINE_TOOLS="$ANDROID_HOME/cmdline-tools/latest"
          if [ ! -f "$CMDLINE_TOOLS/bin/sdkmanager" ]; then
            echo "Downloading cmdline-tools..."
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/cmdline-tools.zip
            unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools-tmp
            mv /tmp/cmdline-tools-tmp/cmdline-tools "$CMDLINE_TOOLS"
            rm -rf /tmp/cmdline-tools-tmp /tmp/cmdline-tools.zip
          fi
          # Accept licenses first
          yes | "$CMDLINE_TOOLS/bin/sdkmanager" --licenses 2>/dev/null || true
          # Install platform 34 and build-tools
          "$CMDLINE_TOOLS/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" 2>&1 || \
            echo "sdkmanager install failed, continuing anyway"
          # Remove Platform 30 to prevent Gradle from using it
          rm -rf "$ANDROID_HOME/platforms/android-30"
          echo "=== Installed platforms ==="
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir"
      - run: flutter build apk --release
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          HASH=${GITHUB_SHA::7}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CatTrace-v1.0.0-${DATE}-${HASH}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-release
          path: build/app/outputs/flutter-apk/CatTrace-v1.0.0-*.apk
