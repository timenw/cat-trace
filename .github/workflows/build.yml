name: Build CatTrace APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch isar_flutter_libs for Android
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
          fi
          for BF in $(find "$DIR" -name 'build.gradle' -o -name 'build.gradle.kts'); do
            if ! grep -q namespace "$BF"; then
              if echo "$BF" | grep -q '\.kts$'; then
                sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$BF"
              else
                sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BF"
              fi
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk [= ]*[0-9]*/compileSdk 34/' "$BF"
            else
              sed -i '/^android {/a\    compileSdk 34' "$BF"
            fi
          done
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch isar_flutter_libs for Android
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
          fi
          for BF in $(find "$DIR" -name 'build.gradle' -o -name 'build.gradle.kts'); do
            if ! grep -q namespace "$BF"; then
              if echo "$BF" | grep -q '\.kts$'; then
                sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$BF"
              else
                sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BF"
              fi
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk [= ]*[0-9]*/compileSdk 34/' "$BF"
            else
              sed -i '/^android {/a\    compileSdk 34' "$BF"
            fi
          done
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-release
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
          generate_release_notes: true
