name: Build CatTrace APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Fix isar_flutter_libs for AGP 8.x
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          # Fix AndroidManifest.xml: remove package attr and lStar attr
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
            sed -i 's/ android:attr\/lStar="[^"]*"//' "$MF"
            sed -i '/android:attr\/lStar/d' "$MF"
          fi
          # Fix build.gradle: add namespace
          BG=$(find "$DIR" -name 'build.gradle' | head -1)
          if [ -n "$BG" ] && ! grep -q namespace "$BG"; then
            sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BG"
          fi
          KT=$(find "$DIR" -name 'build.gradle.kts' | head -1)
          if [ -n "$KT" ] && ! grep -q namespace "$KT"; then
            sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$KT"
          fi
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Fix isar_flutter_libs for AGP 8.x
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
            sed -i 's/ android:attr\/lStar="[^"]*"//' "$MF"
            sed -i '/android:attr\/lStar/d' "$MF"
          fi
          BG=$(find "$DIR" -name 'build.gradle' | head -1)
          if [ -n "$BG" ] && ! grep -q namespace "$BG"; then
            sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BG"
          fi
          KT=$(find "$DIR" -name 'build.gradle.kts' | head -1)
          if [ -n "$KT" ] && ! grep -q namespace "$KT"; then
            sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$KT"
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          HASH=${GITHUB_SHA::7}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CatTrace-v1.0.0-${DATE}-${HASH}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-release
          path: build/app/outputs/flutter-apk/CatTrace-v1.0.0-*.apk
