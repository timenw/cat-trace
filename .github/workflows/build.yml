name: Build CatTrace APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Fix isar_flutter_libs namespace for AGP 8.x
        run: |
            PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
            ISAR_DIR=$(find "$PUB_CACHE_DIR" -type d -name "isar_flutter_libs-*" 2>/dev/null | head -1)
            echo "ISAR_DIR=$ISAR_DIR"

            # Step 1: Remove package attribute from AndroidManifest.xml (AGP 8.x doesn't support it)
            ISAR_MANIFEST=$(find "$ISAR_DIR" -path "*/android/src/main/AndroidManifest.xml" 2>/dev/null | head -1)
            if [ -n "$ISAR_MANIFEST" ]; then
              echo "Removing package attribute from $ISAR_MANIFEST"
              sed -i 's/ package="[^"]*"//' "$ISAR_MANIFEST"
            fi

            # Step 2: Add namespace to build.gradle or build.gradle.kts
            ISAR_GRADLE=$(find "$ISAR_DIR" -path "*/android/build.gradle" 2>/dev/null | head -1)
            ISAR_KOTLIN=$(find "$ISAR_DIR" -path "*/android/build.gradle.kts" 2>/dev/null | head -1)
            if [ -n "$ISAR_GRADLE" ] && ! grep -qi "namespace" "$ISAR_GRADLE"; then
              sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$ISAR_GRADLE"
              echo "Added namespace (Groovy) to $ISAR_GRADLE"
            fi
            if [ -n "$ISAR_KOTLIN" ] && ! grep -qi "namespace" "$ISAR_KOTLIN"; then
              sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$ISAR_KOTLIN"
              echo "Added namespace (Kotlin DSL) to $ISAR_KOTLIN"
            fi
        - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Fix isar_flutter_libs namespace for AGP 8.x
        run: |
          PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
          ISAR_DIR=$(find "$PUB_CACHE_DIR" -type d -name "isar_flutter_libs-*" 2>/dev/null | head -1)
          ISAR_MANIFEST=$(find "$ISAR_DIR" -path "*/android/src/main/AndroidManifest.xml" 2>/dev/null | head -1)
          if [ -n "$ISAR_MANIFEST" ]; then
            sed -i 's/ package="[^"]*"//' "$ISAR_MANIFEST"
          fi
          ISAR_GRADLE=$(find "$ISAR_DIR" -path "*/android/build.gradle" 2>/dev/null | head -1)
          ISAR_KOTLIN=$(find "$ISAR_DIR" -path "*/android/build.gradle.kts" 2>/dev/null | head -1)
          if [ -n "$ISAR_GRADLE" ] && ! grep -qi "namespace" "$ISAR_GRADLE"; then
            sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$ISAR_GRADLE"
          fi
          if [ -n "$ISAR_KOTLIN" ] && ! grep -qi "namespace" "$ISAR_KOTLIN"; then
            sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$ISAR_KOTLIN"
          fi
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          HASH=${GITHUB_SHA::7}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CatTrace-v1.0.0-${DATE}-${HASH}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-release
          path: build/app/outputs/flutter-apk/CatTrace-v1.0.0-*.apk
