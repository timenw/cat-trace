name: Build CatTrace APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  lint:
    name: Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter analyze --no-fatal-infos

  test:
    name: Unit & Widget Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter test

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch isar_flutter_libs
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
            sed -i '/android:attr\/lStar/d' "$MF"
          fi
          for BG in $(find "$DIR" -name 'build.gradle'); do
            if ! grep -q namespace "$BG"; then
              sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BG"
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk [0-9]*/compileSdk 34/' "$BG"
            else
              sed -i '/^android {/a\    compileSdk 34' "$BG"
            fi
          done
          for KT in $(find "$DIR" -name 'build.gradle.kts'); do
            if ! grep -q namespace "$KT"; then
              sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$KT"
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk = [0-9]*/compileSdk = 34/' "$KT"
            else
              sed -i '/^android {/a\    compileSdk = 34' "$KT"
            fi
          done
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Patch isar_flutter_libs
        run: |
          PUB="${PUB_CACHE:-$HOME/.pub-cache}"
          DIR=$(find "$PUB" -maxdepth 3 -type d -name 'isar_flutter_libs-*' | head -1)
          MF=$(find "$DIR" -path '*/AndroidManifest.xml' | head -1)
          if [ -n "$MF" ]; then
            sed -i 's/ package="[^"]*"//' "$MF"
            sed -i '/android:attr\/lStar/d' "$MF"
          fi
          for BG in $(find "$DIR" -name 'build.gradle'); do
            if ! grep -q namespace "$BG"; then
              sed -i '/^android {/a\    namespace "com.cattrace.isar_flutter_libs"' "$BG"
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk [0-9]*/compileSdk 34/' "$BG"
            else
              sed -i '/^android {/a\    compileSdk 34' "$BG"
            fi
          done
          for KT in $(find "$DIR" -name 'build.gradle.kts'); do
            if ! grep -q namespace "$KT"; then
              sed -i '/^android {/a\    namespace = "com.cattrace.isar_flutter_libs"' "$KT"
            fi
            if grep -q 'compileSdk'; then
              sed -i 's/compileSdk = [0-9]*/compileSdk = 34/' "$KT"
            else
              sed -i '/^android {/a\    compileSdk = 34' "$KT"
            fi
          done
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --release
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          HASH=${GITHUB_SHA::7}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/CatTrace-v1.0.0-${DATE}-${HASH}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: cat-trace-release
          path: build/app/outputs/flutter-apk/CatTrace-v1.0.0-*.apk
